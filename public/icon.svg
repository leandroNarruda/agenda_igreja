<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Calendar body -->
  <rect x="4" y="10" width="24" height="18" rx="2" fill="#7e5686"/>
  <!-- Calendar header strip -->
  <rect x="4" y="10" width="24" height="7" rx="2" fill="#9b6aad"/>
  <rect x="4" y="14" width="24" height="3" fill="#9b6aad"/>
  <!-- Ring left -->
  <rect x="10" y="7" width="3" height="6" rx="1.5" fill="#e8f9a2"/>
  <!-- Ring right -->
  <rect x="19" y="7" width="3" height="6" rx="1.5" fill="#e8f9a2"/>
  <!-- Cross vertical -->
  <rect x="14.5" y="19" width="3" height="7" rx="1" fill="#e8f9a2"/>
  <!-- Cross horizontal -->
  <rect x="10.5" y="21.5" width="11" height="3" rx="1" fill="#e8f9a2"/>
</svg>
